# Carrefour España — in-store e-tickets (receipts)
#
# The purchases API lives on pro.api.carrefour.es (Google APIgee gateway), NOT on
# www.carrefour.es and NOT behind Cloudflare. CORS is fully open
# (allow-origin: *, allow-headers: *) and auth is a Bearer token ONLY:
# without an Authorization header it returns 401. So this adapter does not rely on
# cookies — it must reuse the SPA's Bearer token, captured from the live session.
#
# STATUS: list endpoint + field mapping CONFIRMED. Still TODO:
#   1. auth: how to obtain the Bearer token (intercept the SPA's requests).
#   2. detail/PDF: endpoint for line items and the downloadable ticket PDF.

id: carrefour-es
version: 0.2.0
name: Carrefour España — tickets

hosts:
  read:
    - pro.api.carrefour.es      # purchases API (APIgee)
    - www.carrefour.es          # SPA origin / where the token is minted

# Auth is a Bearer token, not a cookie. The token is minted by the SPA on
# www.carrefour.es. The userscript prototype will capture it by monkey-patching
# fetch/XHR to read the outgoing `Authorization` header (most robust vs. reading
# storage). NOTE: the declarative adapter format needs a new `auth` concept for
# this — feed back into docs/FUNCTIONAL-SPEC.md.
auth:
  type: bearerIntercept         # TODO confirm: also an apikey/x-api-key header?
  header: Authorization

loginSignal:
  type: endpoint200
  # Session is "active" if the purchases endpoint returns 200 with the token.

list:
  request:
    method: GET
    url: https://pro.api.carrefour.es/md-purchasesAccount-v1/purchases
    credentials: omit           # auth is the Bearer header, not cookies
    query:
      from: "{{windowStart}}"   # ISO, e.g. 2 years back
      to: "{{windowEnd}}"       # ISO, now
      count: 50
      ticketOffset: "{{ticketOffset}}"
      atgfOffset: 0             # online orders (out of scope here)
      atgnfOffset: 0
      currentAtgfOrders: 0
      currentAtgnfOrders: 0
      currentTickets: 0
  itemsPath: "$.purchases[*]"
  # List ALL available documents — the Core builds a user-facing inventory
  # (spec §6.8). The receipt@1 mapping below targets in-store tickets
  # (orderSource == TICKET); online orders (ATGF/ATGNF) are a future invoice map.
  pagination:
    type: offset
    offsetParam: ticketOffset
    sizeParam: count
    nextOffsetPath: "$.offsets.ticketOffset"
    stopWhen: returnedLessThanCount

detail:
  # The ticket PDF is a separate service on the same host. The SPA fetches these
  # bytes and wraps them in a blob: URL for display/download.
  # No structured line-items endpoint observed — the PDF is the detail artifact,
  # which suits Tiquetera (it already parses receipt PDFs).
  pdf:
    urlTemplate: "https://pro.api.carrefour.es/md-ticketsAccount-v1/tickets/{{purchaseId}}/pdf"
    credentials: omit           # Bearer header, same as the list endpoint

fields:
  externalId: "$.purchaseId"
  date:
    path: "$.purchaseDate"
    transform: "datetime:Europe/Madrid"   # source has no timezone
  total:
    path: "$.amount"
    transform: "money:EUR"                 # decimal euros -> minor units
  store.name: "$.mallName"
  store.address: "$.mallAddress"
  store.id: "$.mallId"
  purchaseType: "$.purchaseType"           # HYPERMARKET | REFUELING

dedupeKey: externalId
schema: receipt@1

capabilities:
  read:
    - pro.api.carrefour.es
    - www.carrefour.es
  write:
    - tiquetera.es
