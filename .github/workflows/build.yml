name: Build extension

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # softprops/action-gh-release creates the Release and uploads the zip on v* tags

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # secrets can't be read in a step-level `if`; surface booleans here so the store steps self-skip
      # when credentials aren't configured (tagging then still builds + releases, just no store upload).
      HAS_CWS: ${{ secrets.CWS_REFRESH_TOKEN != '' }}
      HAS_AMO: ${{ secrets.AMO_JWT_SECRET != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - name: Test (node:test)
        run: npm test

      - name: Lint (web-ext)
        run: npm run lint
        continue-on-error: true

      - name: Build package (Chrome + Firefox MV3)
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: habeas-extension
          path: dist/*.zip

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip

      # --- Chrome Web Store upload (milestone v* tags only) -----------------------------------------
      # Uploads the built zip to the store listing. DRAFT by default (publish:false) — it lands as a
      # pending draft you approve/publish by hand in the dashboard. Set publish:true to auto-submit for
      # review. Skips cleanly if the secrets aren't set, so tagging never fails for lack of credentials.
      - name: Locate zip
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        id: zip
        run: echo "path=$(ls dist/*.zip | head -1)" >> "$GITHUB_OUTPUT"

      - name: Upload to Chrome Web Store (publish)
        if: (startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch') && env.HAS_CWS == 'true'
        # Best-effort: a store hiccup (e.g. ITEM_NOT_UPDATABLE while a prior version is still in review)
        # must NOT fail the release or skip the sibling AMO step — the GitHub Release + zip already shipped.
        continue-on-error: true
        uses: mnao305/chrome-extension-upload@v5.0.0
        with:
          file-path: ${{ steps.zip.outputs.path }}
          extension-id: ${{ secrets.CWS_EXTENSION_ID }}
          client-id: ${{ secrets.CWS_CLIENT_ID }}
          client-secret: ${{ secrets.CWS_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CWS_REFRESH_TOKEN }}
          publish: true # auto-submit for Google review (goes live after approval). Set false to only stage a draft.

      # --- Firefox Add-ons (AMO) submission (milestone v* tags / manual dispatch) --------------------
      # web-ext sign --channel=listed submits a new version to AMO for review (goes live after approval).
      # Self-skips until the AMO_* secrets are set. The same MV3 zip source-dir loads in Firefox too.
      - name: Submit to Firefox Add-ons (AMO)
        if: (startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch') && env.HAS_AMO == 'true'
        # Best-effort, and independent of the CWS step above (continue-on-error) so each store publishes
        # on its own. Fails visibly (annotation) if the AMO_JWT_* credentials are wrong ("Unknown JWT iss").
        continue-on-error: true
        run: npx --yes web-ext sign --source-dir extension --channel listed --api-key "$AMO_JWT_ISSUER" --api-secret "$AMO_JWT_SECRET"
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
