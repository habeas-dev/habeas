<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="robots" content="noindex">
  <title>Habeas — Dropbox authorization</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; max-width: 480px; margin: 60px auto; padding: 0 20px; color: #1a1a1a; text-align: center; }
    @media (prefers-color-scheme: dark) { body { background: #111; color: #eee; } }
    .muted { opacity: .7; font-size: .9rem; }
  </style>
</head>
<body>
  <h1>Connecting Dropbox…</h1>
  <p class="muted">The Habeas extension is finishing the connection. You can close this tab.</p>
  <!--
    Static landing for the Habeas extension's Dropbox OAuth: a single, stable https redirect URI registered
    on the Dropbox app (browser-extension redirect URLs are per-install and can't be pre-registered). The
    extension opens the authorize flow in a tab and reads the ?code straight off this page's URL (via
    tabs.onUpdated), then closes the tab. This page holds NO secret and never sees a token — the code is
    PKCE-bound, useless without the verifier that stays in the extension. No script needed here.
  -->
</body>
</html>
