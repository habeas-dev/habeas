<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Habeas Architecture</title>
  <meta name="description" content="Technical architecture and design principles behind Habeas." />
  <link rel="canonical" href="https://habeas.dev/architecture.html" />
  <link rel="icon" type="image/svg+xml" href="logo.svg" />
  <link rel="stylesheet" href="style.css" />
  <meta property="og:title" content="Habeas Architecture" />
  <meta property="og:description" content="Technical architecture and design principles behind Habeas." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://habeas.dev/architecture.html" />
  <style>
    .doc { max-width: 860px; margin: 0 auto; padding: 8px 20px 64px; }
    .doc h1 { font-size: 2rem; margin: 24px 0 14px; }
    .doc h2 { font-size: 1.4rem; margin: 30px 0 10px; }
    .doc h3 { font-size: 1.1rem; margin: 24px 0 8px; }
    .doc p, .doc li, .doc blockquote { line-height: 1.68; }
    .doc ul, .doc ol { padding-left: 1.35em; }
    .doc pre { overflow-x: auto; padding: 14px 16px; border: 1px solid var(--line, #3333); border-radius: 10px; background: color-mix(in srgb, var(--surface) 88%, var(--bg)); }
    .doc code { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: .92em; }
    .doc blockquote { margin: 18px 0; padding: 0 16px; border-left: 3px solid var(--line, #3333); color: var(--muted, #888); }
    .doc hr { border: none; border-top: 1px solid var(--line, #3333); margin: 30px 0; }
    .doc a { color: inherit; text-decoration: underline; text-underline-offset: 2px; }
    .doc .status { color: var(--muted, #888); margin: 18px 0 0; }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <picture>
        <source media="(prefers-color-scheme: dark)" srcset="logo-light.svg" />
        <img class="logo" src="logo.svg" alt="Habeas" />
      </picture>
      <span class="name">Habeas</span>
      <nav>
        <a href="/">Home</a>
        <a href="/why-habeas.html">Why Habeas?</a>
        <a href="/sources.html">Sources</a>
        <a href="/architecture.html">Architecture</a>
        <a href="/privacy.html">Privacy</a>
        <a href="/terms.html">Terms</a>
        <a href="https://github.com/habeas-dev/habeas">GitHub</a>
        <span class="langswitch" role="group" aria-label="Language">
          <button data-lang="en" aria-pressed="true">EN</button>
          <button data-lang="es" aria-pressed="false">ES</button>
        </span>
      </nav>
    </div>
  </header>

  <main class="doc">
    <article id="architecture-content" aria-live="polite">
      <p class="status">Loading architecture…</p>
    </article>
  </main>

  <script src="nav-i18n.js"></script>
  <script>
    const ARCHITECTURE_MD_URL_EN = 'https://raw.githubusercontent.com/habeas-dev/habeas/main/ARCHITECTURE.md';
    const ARCHITECTURE_MD_URL_ES = 'https://raw.githubusercontent.com/habeas-dev/habeas/main/ARCHITECTURE.es.md';
    const MARKDOWN_RENDER_URL = 'https://api.github.com/markdown';
    const TEXT = {
      en: {
        loading: 'Loading architecture…',
        unavailable: 'Could not render markdown from GitHub right now. You can still read the canonical source directly.',
        open: 'Open ARCHITECTURE.md',
      },
      es: {
        loading: 'Cargando arquitectura…',
        unavailable: 'No se pudo renderizar el markdown desde GitHub ahora mismo. Aun así, puedes leer la fuente canónica directamente.',
        open: 'Abrir ARCHITECTURE.es.md',
      },
    };
    const content = document.getElementById('architecture-content');
    const htmlEscapes = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' };
    let lang = 'en';
    let currentRequest = 0;

    function esc(value) {
      return String(value == null ? '' : value).replace(/[&<>"']/g, (char) => htmlEscapes[char]);
    }

    function markdownUrlFor(language) {
      return language === 'es' ? ARCHITECTURE_MD_URL_ES : ARCHITECTURE_MD_URL_EN;
    }

    function setLanguage(next) {
      lang = next === 'es' ? 'es' : 'en';
      document.documentElement.lang = lang;
      globalThis.habeasApplyTopNavLanguage?.(lang);
      document.querySelectorAll('.langswitch button[data-lang]').forEach((button) => {
        button.setAttribute('aria-pressed', String(button.getAttribute('data-lang') === lang));
      });
    }

    function fallback(markdown, language) {
      const t = TEXT[language];
      const url = markdownUrlFor(language);
      content.innerHTML = `<p class="status">${esc(t.unavailable)}</p><p><a href="${url}">${esc(t.open)}</a></p><pre><code>${esc(markdown)}</code></pre>`;
    }

    async function renderArchitecture(language) {
      const requestId = ++currentRequest;
      const t = TEXT[language];
      const markdownUrl = markdownUrlFor(language);
      content.innerHTML = `<p class="status">${esc(t.loading)}</p>`;
      try {
        const mdResponse = await fetch(markdownUrl);
        if (!mdResponse.ok) throw new Error('markdown fetch failed');
        const markdown = await mdResponse.text();

        const htmlResponse = await fetch(MARKDOWN_RENDER_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            text: markdown,
            mode: 'gfm',
            context: 'habeas-dev/habeas',
          }),
        });
        if (!htmlResponse.ok) throw new Error('markdown render failed');
        if (requestId !== currentRequest) return;
        content.innerHTML = await htmlResponse.text();
      } catch (error) {
        try {
          const mdResponse = await fetch(markdownUrl);
          if (!mdResponse.ok) throw new Error('markdown refetch failed');
          if (requestId !== currentRequest) return;
          fallback(await mdResponse.text(), language);
        } catch (finalError) {
          if (requestId !== currentRequest) return;
          fallback('', language);
        }
      }
    }

    (function init() {
      const saved = localStorage.getItem('habeas-lang');
      const initial = (saved === 'en' || saved === 'es')
        ? saved
        : ((navigator.language || 'en').toLowerCase().startsWith('es') ? 'es' : 'en');
      setLanguage(initial);
      document.querySelectorAll('.langswitch button[data-lang]').forEach((button) => {
        button.addEventListener('click', () => {
          const next = button.getAttribute('data-lang');
          localStorage.setItem('habeas-lang', next);
          setLanguage(next);
          renderArchitecture(lang);
        });
      });
      renderArchitecture(lang);
    })();
  </script>
</body>
</html>
