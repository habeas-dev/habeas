<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Habeas · Community sources</title>
  <link rel="stylesheet" href="theme.css" />
  <style>body { min-width: 680px; } .stars { color: #e0a400; } .warn { color: #c0392b; font-weight: 600; }</style>
</head>
<body>
  <div class="topbar">
    <img class="logo" src="../../icon-dark-128.png" alt="" />
    <div class="brandwrap">
      <span class="brand">Habeas</span>
      <span class="tagline" data-i18n="market_title"></span>
    </div>
    <button id="opts" data-i18n="settings"></button>
  </div>

  <div class="app">
    <p class="muted" data-i18n="market_intro" style="margin:2px 0 12px"></p>
    <div class="toolbar">
      <input id="q" type="search" class="search" data-i18n-ph="market_search" autocomplete="off" />
      <button id="reload" data-i18n="market_reload"></button>
      <label class="muted" style="display:inline-flex;align-items:center;gap:6px;font-size:13px;white-space:nowrap">
        <input id="beta-toggle" type="checkbox" /> <span data-i18n="market_beta_filter"></span>
      </label>
      <span id="status" class="muted"></span>
    </div>
    <div id="list" class="src-list"></div>
  </div>

  <script type="module" src="marketplace.js"></script>
</body>
</html>
