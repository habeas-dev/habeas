<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Habeas · Archivo</title>
  <link rel="stylesheet" href="theme.css" />
  <style>
    /* ---- extra tokens (extend theme.css) ---- */
    :root{
      --surface-2:#f8fbf9; --radius-lg:18px;
      --shadow-lg:0 2px 6px rgba(13,46,41,.06), 0 16px 42px rgba(13,46,41,.12);
      --cat-retail:#e08a3c; --cat-retail-bg:#faecd8;
      --cat-service:#3f83a3; --cat-service-bg:#e4eff4;
      --cat-finance:#2a7d6d; --cat-finance-bg:#dcece8;
      --cat-other:#7b8a85; --cat-other-bg:#eaf0ed;
      --pos:#2f9e6f; --neg:#c9522b;
    }
    @media (prefers-color-scheme:dark){
      :root{
        --surface-2:#101a17;
        --shadow-lg:0 2px 8px rgba(0,0,0,.4), 0 20px 46px rgba(0,0,0,.5);
        --cat-retail-bg:#3a2a17; --cat-service-bg:#182b32; --cat-finance-bg:#173029; --cat-other-bg:#232b28;
        --pos:#57c48f; --neg:#e0805a;
      }
    }
    *{box-sizing:border-box}
    body{margin:0;min-width:0;background:var(--bg);color:var(--ink);font-family:var(--font-body)}
    .tnum{font-variant-numeric:tabular-nums}
    .muted{color:var(--muted)}

    /* topbar */
    .abar{display:flex;align-items:center;gap:12px;padding:12px 20px;position:sticky;top:0;z-index:5;
      background:linear-gradient(180deg,var(--brand-900),var(--brand-700));color:#eaf4f0}
    .abar .logo{width:30px;height:30px;border-radius:8px}
    .abar .brand{font-family:var(--font-head);font-weight:700;font-size:17px;letter-spacing:-.01em;line-height:1.1}
    .abar .brand small{display:block;font-weight:400;font-size:11px;color:#9fc4ba;font-family:var(--font-body)}
    .abar .search{margin-left:auto;display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.1);
      border:1px solid rgba(255,255,255,.14);border-radius:100px;padding:7px 14px}
    .abar .search input{background:none;border:0;outline:0;color:#eaf4f0;font:inherit;font-size:13px;min-width:150px;width:24vw;max-width:280px}
    .abar .search input::placeholder{color:#9fc4ba}
    .abar button{font-family:var(--font-body);font-weight:600;font-size:13px;border:0;border-radius:100px;padding:8px 15px;cursor:pointer;white-space:nowrap;display:inline-flex;align-items:center;gap:7px;color:#eaf4f0;background:rgba(255,255,255,.12)}
    .abar button.sync{background:var(--accent);color:#241206}
    .abar button.ic{padding:8px 10px;font-size:15px;line-height:1}
    .abar #astatus{font-size:12px;color:#9fc4ba;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

    /* layout */
    .shell{display:grid;grid-template-columns:264px 1fr;align-items:start;max-width:1180px;margin:0 auto;min-height:calc(100vh - 55px)}
    @media (max-width:820px){.shell{grid-template-columns:1fr}}
    .rail{border-right:1px solid var(--line);background:var(--surface-2);padding:16px 12px;position:sticky;top:55px;max-height:calc(100vh - 55px);overflow:auto}
    @media (max-width:820px){.rail{position:static;max-height:none;border-right:0;border-bottom:1px solid var(--line)}}
    .rlabel{font-family:var(--font-head);font-weight:600;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);padding:4px 10px 8px}
    .node{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:10px;cursor:pointer;font-size:14px;white-space:nowrap;border:0;background:none;width:100%;color:var(--ink);text-align:left;font-family:var(--font-body)}
    .node:hover{background:var(--surface)}
    .node.on{background:var(--brand-100);color:var(--brand-600);font-weight:600}
    .node .av{width:27px;height:27px;border-radius:8px;display:grid;place-items:center;font-size:15px;flex:none;background:var(--surface);border:1px solid var(--line)}
    .node.on .av{background:var(--brand-600);border-color:transparent}
    .node .nm{overflow:hidden;text-overflow:ellipsis}
    .node .cnt{margin-left:auto;font-size:11.5px;color:var(--muted);background:var(--surface);border:1px solid var(--line);border-radius:100px;padding:1px 8px;font-variant-numeric:tabular-nums}
    .node.on .cnt{background:rgba(255,255,255,.55);border-color:transparent;color:var(--brand-600)}
    .subtree{display:flex;flex-direction:column;gap:2px;margin:2px 0 6px 20px;padding-left:12px;border-left:1.5px solid var(--line)}
    .subnode{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:8px;font-size:13px;cursor:pointer;color:var(--muted);border:0;background:none;width:100%;text-align:left;font-family:var(--font-body)}
    .subnode:hover{background:var(--surface);color:var(--ink)}
    .subnode.on{color:var(--brand-600);font-weight:600}
    .subnode .sd{width:7px;height:7px;border-radius:2px;flex:none;background:var(--brand-500)}
    .subnode.none{font-style:italic} .subnode.none .sd{background:var(--muted)}

    .main{padding:22px 26px;min-width:0}
    @media (max-width:520px){.main{padding:16px}}

    /* index (Todo) */
    .idx-head h1{font-family:var(--font-head);font-weight:700;font-size:clamp(22px,3vw,30px);letter-spacing:-.01em;margin:0}
    .idx-head p{color:var(--muted);margin:6px 0 0;font-size:14.5px}
    .idx-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;margin-top:22px}
    .srccard{display:flex;align-items:center;gap:13px;padding:15px;border:1px solid var(--line);border-radius:var(--radius);background:var(--surface);box-shadow:var(--shadow);cursor:pointer;text-align:left;font:inherit;color:var(--ink);transition:transform .12s,box-shadow .12s,border-color .12s}
    .srccard:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);border-color:var(--brand-100)}
    .srccard .tile{width:46px;height:46px}
    .srccard .sc-m{min-width:0}
    .srccard .sc-t{font-family:var(--font-head);font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .srccard .sc-s{font-size:12px;color:var(--muted);margin-top:2px}

    /* tiles */
    .tile{border-radius:12px;display:grid;place-items:center;font-size:22px;flex:none;width:44px;height:44px}
    .tile.retail{background:var(--cat-retail-bg)} .tile.service{background:var(--cat-service-bg)}
    .tile.finance{background:var(--cat-finance-bg)} .tile.other{background:var(--cat-other-bg)}

    /* docs pane */
    .crumbs{display:flex;align-items:center;gap:9px;font-size:13.5px;color:var(--muted);flex-wrap:wrap}
    .crumbs b{color:var(--ink);font-family:var(--font-head);font-weight:600}
    .summ{display:flex;gap:9px;flex-wrap:wrap;margin-top:10px}
    .chip{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;padding:5px 11px;border-radius:100px;background:var(--surface-2);border:1px solid var(--line);color:var(--muted)}
    .chip b{color:var(--ink);font-variant-numeric:tabular-nums}
    .docbar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-top:16px}
    .groupby{display:inline-flex;align-items:center;gap:2px;background:var(--surface-2);border:1px solid var(--line);border-radius:100px;padding:3px;font-size:12.5px}
    .groupby button{padding:5px 12px;border-radius:100px;color:var(--muted);cursor:pointer;font-weight:600;border:0;background:none;font-family:var(--font-body)}
    .groupby button.on{background:var(--brand-600);color:#fff}
    .selbtn{font-size:12.5px;font-weight:600;border:1px solid var(--line);background:var(--surface);border-radius:100px;padding:6px 13px;cursor:pointer;color:var(--ink);font-family:var(--font-body)}
    .selbtn.on{background:var(--brand-600);color:#fff;border-color:transparent}
    .refbtn{font-size:12.5px;font-weight:600;border:1px solid var(--line);background:var(--surface);border-radius:100px;padding:6px 13px;cursor:pointer;color:var(--ink);font-family:var(--font-body);display:inline-flex;align-items:center;gap:6px}
    .refbtn:hover{border-color:var(--brand-500);color:var(--brand-600)}
    .refbtn[disabled]{pointer-events:none;opacity:.6}
    .refbtn .ic{display:inline-block;font-size:13px;line-height:1}
    .refbtn.spin .ic{animation:hb-spin .7s linear infinite}
    @media (prefers-reduced-motion:reduce){.refbtn.spin .ic{animation:none}}
    /* split button: Refresh + a caret that opens the alternative refresh modes */
    .refwrap{position:relative;display:inline-flex;align-items:stretch}
    .refwrap #refresh{border-radius:100px 0 0 100px}
    .refwrap .caret{border-radius:0 100px 100px 0;border-left:0;padding:6px 9px}
    .refmenu{position:absolute;top:calc(100% + 5px);right:0;z-index:30;min-width:230px;padding:5px;
      background:var(--surface);border:1px solid var(--line);border-radius:11px;box-shadow:var(--shadow-lg);
      display:flex;flex-direction:column;gap:2px}
    .refmenu[hidden]{display:none}
    .refmenu button{display:flex;align-items:center;gap:9px;width:100%;text-align:left;border:0;background:none;
      color:var(--ink);font-family:var(--font-body);font-size:12.5px;font-weight:600;padding:9px 10px;border-radius:8px;cursor:pointer}
    .refmenu button:hover{background:var(--brand-50)}
    .refmenu .ic{font-size:13px}
    .docbar-r{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .savegrp{display:inline-flex;align-items:center;gap:7px;flex-wrap:wrap}
    .savegrp .sl{font-size:12px;color:var(--muted);font-weight:600}
    .savebtn{font-size:12.5px;font-weight:600;border:1px solid var(--brand-500);background:var(--brand-50);color:var(--brand-600);border-radius:100px;padding:6px 13px;cursor:pointer;font-family:var(--font-body);display:inline-flex;align-items:center;gap:6px}
    .savebtn:hover{background:var(--brand-600);color:#fff;border-color:var(--brand-600)}
    body.saving{cursor:progress} body.saving .savebtn{pointer-events:none;opacity:.6}

    .mgroup{margin-top:20px}
    .mhead{display:flex;align-items:baseline;gap:10px;margin-bottom:10px}
    .mhead h4{font-family:var(--font-head);font-size:13.5px;letter-spacing:.02em;color:var(--muted);font-weight:600;margin:0;text-transform:capitalize}
    .mhead .line{flex:1;height:1px;background:var(--line)}
    .mhead .mtot{font-size:12.5px;color:var(--muted);font-variant-numeric:tabular-nums}
    .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:12px}
    .dcard{position:relative;display:flex;align-items:center;gap:13px;padding:12px 14px;border:1px solid var(--line);border-radius:var(--radius);background:var(--surface);box-shadow:var(--shadow);cursor:pointer;transition:transform .12s,box-shadow .12s,border-color .12s;text-align:left;font:inherit;color:var(--ink);width:100%}
    .dcard:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);border-color:var(--brand-100)}
    .dcard.sel{border-color:var(--brand-500);box-shadow:0 0 0 3px var(--brand-100)}
    .dcard .chk{width:18px;height:18px;flex:none;border-radius:5px;border:1.6px solid var(--line);display:none;place-items:center;font-size:12px;color:#fff}
    .selecting .dcard .chk{display:grid}
    .dcard.picked .chk{background:var(--brand-600);border-color:var(--brand-600)}
    .dmeta{min-width:0;flex:1;display:flex;flex-direction:column;gap:3px}
    .dtitle{font-family:var(--font-head);font-weight:600;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .dsub{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:7px;flex-wrap:wrap}
    .dsub .fmt{font-size:10px;font-weight:600;letter-spacing:.04em;padding:1px 6px;border-radius:5px;background:var(--surface-2);border:1px solid var(--line);color:var(--muted)}
    .damt{text-align:right;flex:none;display:flex;flex-direction:column;align-items:flex-end;gap:5px}
    .damt .v{font-family:var(--font-head);font-weight:700;font-size:15px;font-variant-numeric:tabular-nums;letter-spacing:-.01em}
    .damt .v.neg{color:var(--neg)} .damt .v.pos{color:var(--pos)}
    .status{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:100px}
    .status.sent{background:var(--brand-100);color:var(--brand-600)}
    .status.new{background:var(--cat-retail-bg);color:var(--cat-retail)}
    .status .d{width:6px;height:6px;border-radius:50%;background:currentColor}

    .empty{padding:60px 20px;text-align:center;color:var(--muted)}
    .empty .big{font-size:34px;margin-bottom:10px}
    /* throbbers / progressive loading */
    .thb{display:inline-block;width:13px;height:13px;border:2px solid var(--line);border-top-color:var(--brand-500);border-radius:50%;animation:hb-spin .7s linear infinite;vertical-align:-2px}
    .thb.big{width:32px;height:32px;border-width:3px}
    @keyframes hb-spin{to{transform:rotate(360deg)}}
    .loadpane{display:grid;place-items:center;gap:14px;padding:80px 20px;color:var(--muted);font-size:14px}
    .idx-grid.hydrating .srccard{opacity:.92}
    @media (prefers-reduced-motion:reduce){.thb{animation:none;border-top-color:var(--brand-500)}}

    /* selection action bar */
    .selbar{position:sticky;bottom:14px;margin-top:20px;display:none;align-items:center;gap:12px;
      background:var(--brand-900);color:#eaf4f0;border-radius:100px;padding:10px 12px 10px 18px;box-shadow:var(--shadow-lg);width:fit-content}
    .selecting .selbar{display:flex}
    .selbar b{font-family:var(--font-head)}
    .selbar button{border:0;border-radius:100px;padding:8px 15px;font-weight:600;cursor:pointer;font-family:var(--font-body);font-size:13px}
    .selbar .go{background:var(--accent);color:#241206}
    .selbar .clr{background:rgba(255,255,255,.14);color:#eaf4f0}
    .selbar .pick{background:rgba(255,255,255,.10);color:#eaf4f0;font-size:12px;padding:7px 12px}
    .savegrp .caret{padding:6px 9px}
    .refmenu .menuhead{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);padding:6px 10px 4px}

    /* reused modal — the account picker (accountpicker.js) builds its own overlay + a .card box with .row rows */
    .card{background:var(--surface);color:var(--ink);border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:var(--shadow-lg)}
    .card h3{font-family:var(--font-head);margin:0 0 2px;font-size:16px}
    .card .row{display:flex;align-items:center}
    .card .muted{color:var(--muted);font-size:12.5px}
    .card label{cursor:pointer}
    .card button{border:1px solid var(--line);background:var(--surface);color:var(--ink);border-radius:100px;padding:7px 14px;font-weight:600;cursor:pointer;font-family:var(--font-body);font-size:13px}
    .card button:hover{border-color:var(--brand-500)}
    .card button.primary{background:var(--brand-600);color:#fff;border-color:transparent}

    /* drawer */
    #scrim{position:fixed;inset:0;background:rgba(6,20,17,.45);opacity:0;pointer-events:none;transition:opacity .2s;z-index:20}
    #scrim.on{opacity:1;pointer-events:auto}
    .drawer{position:fixed;top:0;right:0;height:100vh;width:min(440px,94vw);background:var(--surface);
      border-left:1px solid var(--line);box-shadow:var(--shadow-lg);transform:translateX(100%);transition:transform .24s ease;z-index:21;display:flex;flex-direction:column}
    .drawer.on{transform:none}
    .dwh{padding:18px 20px;background:linear-gradient(180deg,var(--brand-50),var(--surface));border-bottom:1px solid var(--line);display:flex;gap:14px;align-items:center}
    .dwh .tile{width:52px;height:52px;font-size:26px}
    .dwh h3{font-family:var(--font-head);font-size:17px;margin:0}
    .dwh .sub{font-size:13px;color:var(--muted);margin-top:2px}
    .dwh .x{margin-left:auto;align-self:flex-start;border:1px solid var(--line);background:var(--surface);border-radius:8px;cursor:pointer;padding:5px 9px;color:var(--ink)}
    .dwb{padding:18px 20px;overflow:auto;flex:1;display:flex;flex-direction:column;gap:16px}
    .kvx{display:grid;grid-template-columns:auto 1fr;gap:8px 16px;font-size:13.5px}
    .kvx dt{color:var(--muted)} .kvx dd{margin:0;text-align:right;font-variant-numeric:tabular-nums;font-weight:600;overflow-wrap:anywhere}
    .actions{display:flex;flex-direction:column;gap:9px}
    .abtn{display:flex;align-items:center;gap:12px;padding:12px 15px;border-radius:var(--radius-sm);border:1px solid var(--line);background:var(--surface);cursor:pointer;font-size:14px;font-weight:600;text-align:left;color:var(--ink);font-family:var(--font-body);width:100%}
    .abtn:hover{border-color:var(--brand-100)}
    .abtn .ai{width:32px;height:32px;border-radius:8px;display:grid;place-items:center;flex:none;font-size:16px;background:var(--surface-2)}
    .abtn small{display:block;font-weight:400;color:var(--muted);font-size:12px;margin-top:1px}
    .abtn.primary{background:var(--brand-600);color:#fff;border-color:transparent}
    .abtn.primary .ai{background:rgba(255,255,255,.16)}
    .actions-note{font-size:13px;color:var(--muted);border:1px dashed var(--line);border-radius:var(--radius-sm);padding:12px 14px;background:var(--surface-2)}
    .grow{flex:1}
    .rawtoggle{font-size:12.5px;color:var(--brand-500);cursor:pointer;background:none;border:0;padding:0;font-family:var(--font-body);align-self:flex-start}
    pre.raw{font-size:11.5px;background:var(--surface-2);border:1px solid var(--line);border-radius:8px;padding:10px;overflow:auto;max-height:280px;margin:0}
  </style>
</head>
<body>
  <div class="abar">
    <img class="logo" src="../../icon-dark-128.png" alt="" />
    <div class="brand">Habeas<small data-i18n="archive_tag"></small></div>
    <div class="search"><span>🔍</span><input id="q" type="search" data-i18n-ph="archive_search" /></div>
    <span id="astatus"></span>
    <button id="logs" class="ic" data-i18n-title="activity" aria-label="Activity log">🗒️</button>
    <button id="sync" class="sync" data-i18n="sync_all"></button>
    <button id="opts" data-i18n="settings"></button>
  </div>

  <div class="shell">
    <nav class="rail" id="rail"></nav>
    <main class="main" id="main"></main>
  </div>

  <div id="scrim"></div>
  <aside class="drawer" id="drawer" aria-hidden="true">
    <div class="dwh">
      <div class="tile other" id="dw-tile">📄</div>
      <div style="min-width:0"><h3 id="dw-title"></h3><div class="sub" id="dw-sub"></div></div>
      <button class="x" id="dw-close" aria-label="Close">✕</button>
    </div>
    <div class="dwb" id="dw-body"></div>
  </aside>

  <script type="module" src="archive.js"></script>
</body>
</html>
