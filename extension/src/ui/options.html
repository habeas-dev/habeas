<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Habeas · Settings</title>
  <link rel="stylesheet" href="theme.css" />
</head>
<body>
  <div class="topbar">
    <img class="logo" src="../../icon-dark-128.png" alt="" />
    <div class="brandwrap">
      <span class="brand">Habeas</span>
      <span class="tagline" data-i18n="settings"></span>
    </div>
  </div>

  <div class="app">
    <div class="section-title"><h2 data-i18n="datasources"></h2></div>
    <div id="ds"></div>
    <div class="card row">
      <button id="create" class="primary" data-i18n="create_source"></button>
      <button id="import" data-i18n="import_source"></button>
      <button id="browse" data-i18n="browse_sources"></button>
      <input id="importfile" type="file" accept="application/json" hidden />
    </div>

    <div class="section-title"><h2 data-i18n="destinations"></h2></div>
    <div id="sinks"></div>
    <div class="card">
      <b data-i18n="add_destination"></b>
      <div class="row" style="margin-top:12px">
        <select id="stype">
          <option value="download" data-i18n="sink_download"></option>
          <option value="local-folder" data-i18n="sink_local"></option>
          <option value="drive" data-i18n="sink_drive"></option>
          <option value="http" data-i18n="sink_http"></option>
        </select>
        <span id="sfields" class="row"></span>
        <button id="addsink" class="primary" data-i18n="add"></button>
      </div>
    </div>

    <div class="section-title"><h2 data-i18n="auto_sync"></h2></div>
    <p class="muted" data-i18n="auto_help" style="margin:2px 0 8px"></p>
    <div id="routes"></div>
  </div>

  <script type="module" src="options.js"></script>
</body>
</html>
