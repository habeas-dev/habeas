<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Habeas · Settings</title>
  <link rel="stylesheet" href="theme.css" />
  <style>
    .tabbar { display: flex; gap: 2px; border-bottom: 1px solid var(--line); margin: 0 0 18px; flex-wrap: wrap; }
    .tab-btn { background: none; border: none; border-bottom: 2px solid transparent; padding: 10px 14px; margin-bottom: -1px; cursor: pointer; color: var(--muted); font: inherit; }
    .tab-btn[aria-selected="true"] { color: var(--ink); border-bottom-color: var(--accent); font-weight: 600; }
    .tab-btn:hover { color: var(--ink); }
    .tab { animation: fade .15s ease; }
    @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body>
  <div class="topbar">
    <img class="logo" src="../../icon-dark-128.png" alt="" />
    <div class="brandwrap">
      <span class="brand">Habeas</span>
      <span class="tagline" data-i18n="settings"></span>
    </div>
  </div>

  <div class="app">
    <div class="tabbar" role="tablist">
      <button class="tab-btn" role="tab" data-tab="sources" data-i18n="datasources" aria-selected="true"></button>
      <button class="tab-btn" role="tab" data-tab="dests" data-i18n="destinations"></button>
      <button class="tab-btn" role="tab" data-tab="auto" data-i18n="auto_sync"></button>
      <button class="tab-btn" role="tab" data-tab="integrations" data-i18n="grants_title"></button>
    </div>

    <section class="tab" data-tab="sources" role="tabpanel">
      <div class="toolbar">
        <input id="ds-search" type="search" class="search" data-i18n-ph="search_sources" autocomplete="off" />
        <span class="spacer"></span>
        <button id="browse" class="primary" data-i18n="browse_sources"></button>
        <button id="create" data-i18n="create_source"></button>
        <button id="import" data-i18n="import_source"></button>
        <button id="paste" data-i18n="paste_source"></button>
        <input id="importfile" type="file" accept="application/json" hidden />
      </div>
      <div id="ds" class="src-list"></div>
      <p id="ds-empty" class="muted" hidden data-i18n="no_sources_match"></p>
    </section>

    <section class="tab" data-tab="dests" role="tabpanel" hidden>
      <div class="card">
        <b data-i18n="store_title"></b>
        <p class="muted" data-i18n="store_help" style="margin:4px 0 6px"></p>
        <p class="muted" data-i18n="dest_multidevice_hint" style="margin:0 0 10px; border-left:3px solid var(--brand-600); padding-left:8px"></p>
        <div class="row">
          <span class="muted" data-i18n="store_where"></span>
          <select id="store-backend">
            <option value="local" data-i18n="store_local"></option>
            <option value="folder" data-i18n="store_folder"></option>
            <option value="drive" data-i18n="store_drive"></option>
            <option value="http" data-i18n="store_http"></option>
          </select>
          <span id="store-fields" class="row"></span>
          <button id="store-move" data-i18n="store_move"></button>
          <span id="store-status" class="muted"></span>
        </div>
        <div class="row" style="margin-top:8px">
          <span class="muted" data-i18n="store_import_from"></span>
          <select id="store-import-sink"></select>
          <button id="store-import" data-i18n="store_import"></button>
          <span id="store-import-status" class="muted"></span>
        </div>
      </div>
      <div id="sinks"></div>
      <div class="card">
        <b data-i18n="add_destination"></b>
        <div class="row" style="margin-top:12px">
          <select id="stype">
            <option value="download" data-i18n="sink_download"></option>
            <option value="local-folder" data-i18n="sink_local"></option>
            <option value="drive" data-i18n="sink_drive"></option>
            <option value="http" data-i18n="sink_http"></option>
            <option value="webdav" data-i18n="sink_webdav"></option>
          </select>
          <span id="sfields" class="row"></span>
          <button id="addsink" class="primary" data-i18n="add"></button>
        </div>
      </div>
    </section>

    <section class="tab" data-tab="auto" role="tabpanel" hidden>
      <p class="muted" data-i18n="auto_help" style="margin:2px 0 12px"></p>
      <div class="toolbar"><input id="auto-search" type="search" class="search" data-i18n-ph="search_sources" autocomplete="off" /></div>
      <div id="routes" class="src-list"></div>
      <p id="auto-empty" class="muted" hidden data-i18n="no_sources_match"></p>
    </section>

    <section class="tab" data-tab="integrations" role="tabpanel" hidden>
      <p class="muted" data-i18n="grants_help" style="margin:2px 0 12px"></p>
      <div id="grants"></div>
    </section>
  </div>

  <script type="module" src="options.js"></script>
</body>
</html>
