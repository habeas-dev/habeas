<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Habeas</title>
  <link rel="stylesheet" href="theme.css" />
  <style>
    body { min-width: 640px; }
    .tabs { display: flex; gap: 4px; margin: 14px 0 4px; border-bottom: 1px solid var(--line); }
    .tab { background: none; border: none; border-bottom: 2px solid transparent; padding: 8px 14px; cursor: pointer; color: var(--muted); font: inherit; }
    .tab.active { color: var(--fg, inherit); border-bottom-color: var(--accent, #4a7); font-weight: 600; }
    .badge-sink { display: inline-block; padding: 1px 7px; margin: 0 3px 3px 0; border-radius: 999px; font-size: 11px; border: 1px solid var(--line); cursor: pointer; }
    .badge-sink:hover { background: var(--accent, #4a7); color: #fff; }
    #doc-modal[hidden] { display: none; }
    .doc-modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.45); }
    .doc-modal-panel { position: fixed; inset: 5% 5% auto 5%; max-height: 88vh; overflow: auto; background: var(--bg, #fff); border: 1px solid var(--line); border-radius: 10px; padding: 14px 16px; box-shadow: 0 10px 40px rgba(0,0,0,.35); }
    .doc-modal-head { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .doc-modal-head button { background: none; border: 1px solid var(--line); border-radius: 6px; cursor: pointer; padding: 4px 8px; }
    .kv { border-collapse: collapse; width: 100%; font-size: 13px; }
    .kv th, .kv td { text-align: left; padding: 4px 8px; border-bottom: 1px solid var(--line); vertical-align: top; }
    .kv th { color: var(--muted); font-weight: 600; white-space: nowrap; width: 1%; }
    .kv .nested { padding-left: 0; }
    .kv td.v { font-variant-numeric: tabular-nums; overflow-wrap: anywhere; }
    .doc-frame { width: 100%; height: 70vh; border: 1px solid var(--line); border-radius: 6px; }
  </style>
</head>
<body>
  <div class="topbar">
    <img class="logo" src="../../icon-dark-128.png" alt="" />
    <div class="brandwrap">
      <span class="brand">Habeas</span>
      <span class="tagline" data-i18n="tagline"></span>
    </div>
    <button id="sync-all" class="primary" data-i18n="sync_all"></button>
    <button id="opts" data-i18n="settings"></button>
  </div>

  <div class="app">
    <div class="card">
      <div class="section-title"><h3 data-i18n="about_title"></h3></div>
      <p class="muted" data-i18n="about_body" style="margin:6px 0 12px"></p>
      <a id="repo" href="https://github.com/habeas-dev/habeas" target="_blank" rel="noopener" data-i18n="learn_more"></a>
      <span id="version" class="muted" style="float:right;font-size:11px"></span>
    </div>

    <div class="tabs" role="tablist">
      <button id="tab-sources" class="tab active" data-i18n="tab_sources"></button>
      <button id="tab-docs" class="tab" data-i18n="tab_documents"></button>
    </div>

    <div id="view-sources">
    <div class="section-title"><h2 data-i18n="documents"></h2></div>
    <div class="card">
      <div class="row">
        <select id="ds"></select>
        <button id="list" class="primary" data-i18n="list_docs"></button>
        <button id="full-history" hidden data-i18n="full_history" data-i18n-title="full_history_hint"></button>
        <button id="load-store" hidden data-i18n="load_store"></button>
        <span id="spin" class="spinner" hidden aria-hidden="true"></span>
        <span id="status" class="muted"></span>
        <button id="stop" hidden data-i18n="stop"></button>
      </div>
      <div class="row" id="outputs" hidden style="margin-top:8px;gap:12px"></div>
      <div class="row" id="sendbar" hidden style="margin-top:12px">
        <span data-i18n="send_to"></span>
        <select id="sink"></select>
        <button id="send" class="accent" data-i18n="send_selected"></button>
        <label style="display:inline-flex;align-items:center;gap:5px" data-i18n-title="force_redownload_hint"><input type="checkbox" id="force-redownload"><span data-i18n="force_redownload"></span></label>
      </div>
      <div class="row" id="selbar" hidden style="margin-top:12px">
        <small data-i18n="select_label"></small>
        <button id="sel-new" data-i18n="sel_new"></button>
        <button id="sel-all" data-i18n="sel_all"></button>
        <button id="sel-none" data-i18n="sel_none"></button>
      </div>
      <div class="row" id="filterbar" hidden style="margin-top:10px;gap:8px;align-items:center">
        <small class="muted" data-i18n="filter_label"></small>
        <select id="filter-group" hidden></select>
        <select id="filter-type" hidden></select>
      </div>
      <table id="tbl" style="margin-top:14px">
        <thead><tr>
          <th></th>
          <th class="sortable" data-sort="date"><span data-i18n="th_date"></span><span class="sort-ind"></span></th>
          <th class="sortable col-group" data-sort="group"><span data-i18n="th_group"></span><span class="sort-ind"></span></th>
          <th class="sortable" data-sort="type"><span data-i18n="th_type"></span><span class="sort-ind"></span></th>
          <th data-i18n="th_store"></th>
          <th data-i18n="th_files"></th>
          <th class="r" data-i18n="th_amount"></th>
          <th data-i18n="th_status"></th>
        </tr></thead>
        <tbody></tbody>
      </table>
      <pre id="log" class="log" style="margin-top:14px"></pre>
    </div>

    <div class="section-title"><h2 data-i18n="activity"></h2></div>
    <div class="card"><div id="activity"></div></div>
    </div><!-- /view-sources -->

    <div id="view-docs" hidden>
      <div class="section-title"><h2 data-i18n="all_documents"></h2></div>
      <div class="card">
        <div class="row">
          <button id="docs-refresh" data-i18n="refresh"></button>
          <span id="docs-status" class="muted"></span>
        </div>
        <div class="row" id="docs-filterbar" style="margin-top:10px;gap:8px;align-items:center">
          <input id="docs-search" type="search" data-i18n-ph="docs_search" style="min-width:200px" />
          <select id="docs-source"></select>
        </div>
        <table id="docs-tbl" style="margin-top:14px">
          <thead><tr>
            <th data-i18n="th_source"></th>
            <th data-i18n="th_date"></th>
            <th data-i18n="th_store"></th>
            <th data-i18n="th_type"></th>
            <th class="r" data-i18n="th_amount"></th>
            <th data-i18n="th_delivered_to"></th>
            <th></th>
          </tr></thead>
          <tbody id="docs-tbody"></tbody>
        </table>
      </div>
    </div>

    <div id="doc-modal" hidden>
      <div class="doc-modal-backdrop"></div>
      <div class="doc-modal-panel" role="dialog" aria-modal="true">
        <div class="doc-modal-head">
          <strong id="doc-modal-title"></strong>
          <span style="flex:1"></span>
          <div id="doc-modal-actions" class="row"></div>
          <button id="doc-modal-close" aria-label="Close">✕</button>
        </div>
        <div id="doc-modal-body"></div>
      </div>
    </div>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
