<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Habeas</title>
  <link rel="stylesheet" href="theme.css" />
  <style>body { min-width: 640px; }</style>
</head>
<body>
  <div class="topbar">
    <img class="logo" src="../../icon-dark-128.png" alt="" />
    <div class="brandwrap">
      <span class="brand">Habeas</span>
      <span class="tagline" data-i18n="tagline"></span>
    </div>
    <button id="sync-all" class="primary" data-i18n="sync_all"></button>
    <button id="opts" data-i18n="settings"></button>
  </div>

  <div class="app">
    <div class="card">
      <div class="section-title"><h3 data-i18n="about_title"></h3></div>
      <p class="muted" data-i18n="about_body" style="margin:6px 0 12px"></p>
      <a id="repo" href="https://github.com/habeas-dev/habeas" target="_blank" rel="noopener" data-i18n="learn_more"></a>
      <span id="version" class="muted" style="float:right;font-size:11px"></span>
    </div>

    <div class="section-title"><h2 data-i18n="documents"></h2></div>
    <div class="card">
      <div class="row">
        <select id="ds"></select>
        <button id="list" class="primary" data-i18n="list_docs"></button>
        <button id="full-history" hidden data-i18n="full_history"></button>
        <button id="load-store" hidden data-i18n="load_store"></button>
        <span id="spin" class="spinner" hidden aria-hidden="true"></span>
        <span id="status" class="muted"></span>
        <button id="stop" hidden data-i18n="stop"></button>
      </div>
      <div class="row" id="outputs" hidden style="margin-top:8px;gap:12px"></div>
      <div class="row" id="sendbar" hidden style="margin-top:12px">
        <span data-i18n="send_to"></span>
        <select id="sink"></select>
        <button id="send" class="accent" data-i18n="send_selected"></button>
      </div>
      <div class="row" id="selbar" hidden style="margin-top:12px">
        <small data-i18n="select_label"></small>
        <button id="sel-new" data-i18n="sel_new"></button>
        <button id="sel-all" data-i18n="sel_all"></button>
        <button id="sel-none" data-i18n="sel_none"></button>
      </div>
      <div class="row" id="filterbar" hidden style="margin-top:10px;gap:8px;align-items:center">
        <small class="muted" data-i18n="filter_label"></small>
        <select id="filter-group" hidden></select>
        <select id="filter-type" hidden></select>
      </div>
      <table id="tbl" style="margin-top:14px">
        <thead><tr>
          <th></th>
          <th class="sortable" data-sort="date"><span data-i18n="th_date"></span><span class="sort-ind"></span></th>
          <th class="sortable col-group" data-sort="group"><span data-i18n="th_group"></span><span class="sort-ind"></span></th>
          <th class="sortable" data-sort="type"><span data-i18n="th_type"></span><span class="sort-ind"></span></th>
          <th data-i18n="th_store"></th>
          <th data-i18n="th_files"></th>
          <th class="r" data-i18n="th_amount"></th>
          <th data-i18n="th_status"></th>
        </tr></thead>
        <tbody></tbody>
      </table>
      <pre id="log" class="log" style="margin-top:14px"></pre>
    </div>

    <div class="section-title"><h2 data-i18n="activity"></h2></div>
    <div class="card"><div id="activity"></div></div>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
