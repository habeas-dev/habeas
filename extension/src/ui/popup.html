<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Habeas</title>
  <link rel="stylesheet" href="theme.css" />
  <style>
    body { min-width: 460px; }
    .topbar .topstatus { font-size: 12px; color: #ffffffcc; max-width: 170px; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap; text-align: right; }
    /* quick hero — the popup's whole job: jump into the Archive */
    #quick { margin: 14px 0 4px; padding: 15px 16px; border: 1px solid var(--line); border-radius: 12px;
      background: linear-gradient(180deg, var(--brand-50, #eef4f1), var(--surface, #fff)); }
    #quick[hidden] { display: none; }
    .q-head { display: flex; align-items: center; gap: 12px; }
    .q-title { font-family: var(--font-head); font-weight: 700; font-size: 16px; line-height: 1.15; }
    .q-sub { color: var(--muted); font-size: 12.5px; margin-top: 1px; }
    .q-cta { margin-left: auto; white-space: nowrap; }
    .q-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
    .q-chip { display: inline-flex; align-items: center; gap: 6px; font: inherit; font-size: 12px; padding: 5px 11px;
      border-radius: 100px; background: var(--surface, #fff); border: 1px solid var(--line); cursor: pointer; color: var(--ink, inherit); }
    .q-chip:hover { border-color: var(--brand-500, #2a7d6d); }
    .q-foot { display: flex; align-items: center; gap: 14px; margin-top: 14px; padding-top: 10px;
      border-top: 1px solid var(--line); font-size: 11.5px; }
    .q-foot a, .q-foot .linkbtn { color: var(--muted); text-decoration: none; background: none; border: 0;
      cursor: pointer; font: inherit; font-size: 11.5px; padding: 0; }
    .q-foot .linkbtn { color: var(--brand-500, #2a7d6d); font-weight: 600; }
    .q-foot a:hover, .q-foot .linkbtn:hover { text-decoration: underline; }
    .q-foot #version { margin-left: auto; }
  </style>
</head>
<body>
  <div class="topbar">
    <img class="logo" src="../../icon-dark-128.png" alt="" />
    <div class="brandwrap">
      <span class="brand">Habeas</span>
      <span class="tagline" data-i18n="tagline"></span>
    </div>
    <span id="topstatus" class="topstatus"></span>
    <button id="sync-all" class="primary" data-i18n="sync_all"></button>
    <button id="opts" data-i18n="settings"></button>
  </div>

  <div class="app">
    <div id="contribnotice" hidden class="card" style="border-color:#2e7d32;cursor:pointer">
      <span data-i18n="contrib_popup_notice"></span>
    </div>

    <div id="quick" hidden></div>

    <div class="q-foot">
      <button id="open-advanced" class="linkbtn" data-i18n="open_advanced"></button>
      <a id="repo" href="https://github.com/habeas-dev/habeas" target="_blank" rel="noopener" data-i18n="learn_more"></a>
      <span id="version" class="muted"></span>
    </div>
  </div>

  <script type="module" src="launcher.js"></script>
</body>
</html>
