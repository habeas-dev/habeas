name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Unit tests (node:test)
        run: node --test test/*.test.mjs

  deploy:
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Gate on Cloudflare secret
        id: gate
        run: echo "have=${{ secrets.CLOUDFLARE_API_TOKEN != '' }}" >> "$GITHUB_OUTPUT"
      - name: Deploy (Cloudflare Workers)
        if: steps.gate.outputs.have == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: No secret → skip
        if: steps.gate.outputs.have != 'true'
        run: echo "CLOUDFLARE_API_TOKEN not set — skipping deploy. Add it (and CLOUDFLARE_ACCOUNT_ID) in repo Settings → Secrets to enable auto-deploy."
