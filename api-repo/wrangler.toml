name = "habeas-api"
main = "worker.mjs"
compatibility_date = "2024-11-01"
workers_dev = false

# D1 binding — create the DB then paste its id here:
#   wrangler d1 create habeas-api
[[d1_databases]]
binding = "DB"
database_name = "habeas-api"
database_id = "29a2d336-6364-4a24-9769-32fb5592fba1"

# api.habeas.dev as a Worker Custom Domain — wrangler provisions the DNS record + TLS for you
# (habeas.dev is already a Cloudflare zone). No manual DNS entry needed.
[[routes]]
pattern = "api.habeas.dev"
custom_domain = true
